name: OshoDiscourses
options:
  bundleIdPrefix: com.agraabhi
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
schemes:
  OshoDiscourses:
    build:
      targets:
        OshoDiscourses: all
        OshoDiscoursesWidgets: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OshoDiscoursesTests
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: W2NS9DM63G
    MARKETING_VERSION: "1.2.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  OshoDiscourses:
    type: application
    platform: iOS
    sources:
      - path: OshoDiscourses
        excludes:
          - Info.plist
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agraabhi.oshodiscourses
        SWIFT_OBJC_BRIDGING_HEADER: OshoDiscourses/RNNoise/include/RNNoiseBridge.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/OshoDiscourses/RNNoise/include
          - $(SRCROOT)/OshoDiscourses/RNNoise/src
        GCC_WARN_INHIBIT_ALL_WARNINGS: YES
        GCC_FAST_MATH: NO
    info:
      path: OshoDiscourses/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Discourse Player
        UIBackgroundModes: [audio]
        NSSupportsLiveActivities: true
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
    entitlements:
      path: OshoDiscourses/OshoDiscourses.entitlements
  OshoDiscoursesWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: OshoDiscoursesWidgets
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agraabhi.oshodiscourses.widgets
    info:
      path: OshoDiscoursesWidgets/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: OshoDiscoursesWidgets/OshoDiscoursesWidgets.entitlements
    dependencies:
      - target: OshoDiscourses
        embed: false
  OshoDiscoursesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OshoDiscoursesTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: OshoDiscourses
